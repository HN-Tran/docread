# Push tag vX.Y.Z on master after green CI; pyproject.toml must already match.
name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release v${VERSION} at commit ${GITHUB_SHA}"

      - name: Wait for CI on tagged commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SHA="${GITHUB_SHA}"
          REPO="${{ github.repository }}"
          for attempt in $(seq 1 60); do
            read -r status conclusion < <(
              gh run list --repo "${REPO}" --commit "${SHA}" --workflow CI \
                --json status,conclusion -q '.[0] | "\(.status) \(.conclusion)"' \
                2>/dev/null || echo "missing "
            )
            if [[ "${status}" == "completed" ]]; then
              if [[ "${conclusion}" == "success" ]]; then
                echo "CI succeeded for ${SHA}"
                exit 0
              fi
              echo "CI finished with conclusion: ${conclusion}"
              exit 1
            fi
            echo "CI not done yet (${attempt}/60): status=${status} conclusion=${conclusion}"
            sleep 30
          done
          echo "Timed out after 30 minutes waiting for CI on ${SHA}"
          exit 1

      - uses: astral-sh/setup-uv@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify tagged commit is master tip
        run: |
          set -euo pipefail
          git fetch origin master
          MASTER_SHA=$(git rev-parse origin/master)
          if [[ "${MASTER_SHA}" != "${GITHUB_SHA}" ]]; then
            echo "origin/master (${MASTER_SHA}) is not the tagged commit (${GITHUB_SHA})."
            echo "Tag the current master tip after CI is green."
            exit 1
          fi

      - name: Verify pyproject version matches tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          PYPROJECT_VERSION=$(grep '^version = ' pyproject.toml | sed -E 's/^version = "(.*)"/\1/')
          if [[ "${PYPROJECT_VERSION}" != "${VERSION}" ]]; then
            echo "pyproject.toml version is ${PYPROJECT_VERSION} but tag is v${VERSION}."
            echo "Set version = \"${VERSION}\" in pyproject.toml on master, run uv lock, commit, then tag."
            exit 1
          fi
          echo "pyproject.toml version ${PYPROJECT_VERSION} matches tag v${VERSION}"

      - name: Verify lockfile is in sync
        run: uv lock --check

      - name: Generate release notes
        id: notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          # Previous semver tag (newest excluding the current one), if any.
          PREV_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname \
            | grep -vx "${TAG}" | head -n1 || true)
          if [[ -n "${PREV_TAG}" ]]; then
            RANGE="${PREV_TAG}..${TAG}"
            CHANGELOG_LINK="https://github.com/${REPO}/compare/${PREV_TAG}...${TAG}"
          else
            RANGE="${TAG}"
            CHANGELOG_LINK="https://github.com/${REPO}/commits/${TAG}"
          fi

          notes_file="${RUNNER_TEMP}/release-notes.md"
          : > "${notes_file}"

          # Group Conventional Commit subjects under section headers.
          emit() {
            local header="$1" pattern="$2" body
            body=$(git log --no-merges --pretty=format:'%h%x1f%s' "${RANGE}" \
              | awk -F'\x1f' -v pat="${pattern}" '
                  $2 ~ ("^(" pat ")(\\([^)]*\\))?!?:") {
                    sub("^(" pat ")(\\([^)]*\\))?!?: *", "", $2)
                    printf "- %s (%s)\n", $2, $1
                  }')
            [[ -n "${body}" ]] && printf "### %s\n%s\n\n" "${header}" "${body}" >> "${notes_file}"
            return 0
          }

          emit "Features"      'feat'
          emit "Bug Fixes"     'fix'
          emit "Performance"   'perf'
          emit "Refactoring"   'refactor'
          emit "Documentation" 'docs'
          emit "Build & CI"    'ci|build|chore'

          printf '**Full Changelog**: %s\n' "${CHANGELOG_LINK}" >> "${notes_file}"
          echo "file=${notes_file}" >> "$GITHUB_OUTPUT"
          echo "----- release notes -----"
          cat "${notes_file}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "Release v${VERSION} already exists."
            exit 0
          fi
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file "${{ steps.notes.outputs.file }}"
